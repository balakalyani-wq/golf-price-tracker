# GitHub Actions — runs the ingestion on a schedule, in the cloud,
# for free. This is the "always-on" option: it runs even when your
# laptop is off. Commit this to .github/workflows/ in your repo.
#
# NOTE: GitHub Actions cron runs in UTC and can be delayed at peak
# times. For a portfolio project that's fine. For a SQLite DB you'd
# commit the updated .db back to the repo (shown below) OR — better —
# point ingest.py at a free cloud Postgres (Supabase / Neon) and drop
# the commit step. The Postgres route is what you'd describe as
# "production-like" in an interview.

name: Daily Price Ingestion

on:
  schedule:
    - cron: "0 8 * * *"      # 08:00 UTC daily
  workflow_dispatch:           # also allow manual runs from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas

      - name: Run ingestion
        run: |
          cd ingestion
          python ingest.py

      # Only needed if you keep the SQLite DB in the repo.
      # If you use cloud Postgres, delete this whole step.
      - name: Commit updated database
        run: |
          git config user.name  "price-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add database/tracker.db
          git commit -m "Daily price snapshot $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
